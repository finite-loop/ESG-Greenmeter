services:
  postgres:
    image: postgres:16-alpine
    container_name: greenmeter-db
    environment:
      POSTGRES_USER: greenmeter
      POSTGRES_PASSWORD: greenmeter_local
      POSTGRES_DB: greenmeter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenmeter -d greenmeter"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
