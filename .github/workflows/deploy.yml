name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AZURE_WEBAPP_NAME: greenmeter
  AZURE_WEBAPP_SLOT: staging
  NODE_VERSION: "22"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: greenmeter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: greenmeter/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            greenmeter/.next/standalone
            greenmeter/.next/static
            greenmeter/public
            greenmeter/drizzle
            greenmeter/scripts
            greenmeter/package.json
          retention-days: 1

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: deploy

      - name: Deploy to Azure App Service staging slot
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: ${{ env.AZURE_WEBAPP_SLOT }}
          package: deploy
          startup-command: "npm run db:migrate && npm run start"

  e2e-test:
    runs-on: ubuntu-latest
    needs: deploy-staging
    defaults:
      run:
        working-directory: greenmeter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: greenmeter/package-lock.json

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against staging
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: https://${{ env.AZURE_WEBAPP_NAME }}-${{ env.AZURE_WEBAPP_SLOT }}.azurewebsites.net

  promote-production:
    runs-on: ubuntu-latest
    needs: e2e-test
    environment: production

    steps:
      - name: Swap staging to production
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deployment slot swap \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --slot ${{ env.AZURE_WEBAPP_SLOT }} \
              --target-slot production
